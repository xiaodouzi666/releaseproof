name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Evaluate deterministic safety cases
        run: pnpm eval

      - name: Build
        run: pnpm build

      - name: Build production container
        run: docker build --tag grantguard:ci .

      - name: Smoke-test production container
        run: |
          docker run --detach --name grantguard-ci --publish 8787:8787 \
            --env AUDIT_STORE=memory \
            --env DEMO_STEP_DELAY_MS=0 \
            --env WORKFLOW_CREATE_LIMIT_PER_MINUTE=100 \
            grantguard:ci
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8787/api/health > health.json; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs grantguard-ci
              exit 1
            fi
            sleep 1
          done
          node -e "const h=require('./health.json'); if(h.status!=='ok'||h.service!=='grantguard-api') process.exit(1)"
          curl --fail --silent http://127.0.0.1:8787/non-api-deep-link | grep --quiet 'id="root"'

      - name: Clean up production container
        if: always()
        continue-on-error: true
        run: docker rm --force grantguard-ci
