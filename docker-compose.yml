services:
  grantguard:
    build:
      context: .
      dockerfile: Dockerfile
    image: grantguard:local
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8787"
      AUDIT_STORE: ${AUDIT_STORE:-file}
      GRANTGUARD_DATA_FILE: /app/data/grantguard-store.json
      DEMO_STEP_DELAY_MS: ${DEMO_STEP_DELAY_MS:-420}
      DEPLOYMENT_TARGET: ${DEPLOYMENT_TARGET:-local-docker}
      WORKFLOW_CREATE_LIMIT_PER_MINUTE: ${WORKFLOW_CREATE_LIMIT_PER_MINUTE:-12}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3.7-plus}
      QWEN_FALLBACK_MODEL: ${QWEN_FALLBACK_MODEL:-qwen3.6-flash}
      QWEN_MAX_CONCURRENCY: ${QWEN_MAX_CONCURRENCY:-2}
    ports:
      - "127.0.0.1:${GRANTGUARD_PORT:-8787}:8787"
    volumes:
      - grantguard-data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8787/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  grantguard-data:
