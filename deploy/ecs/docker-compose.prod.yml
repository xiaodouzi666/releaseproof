services:
  releaseproof:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: releaseproof:production
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8787"
      AUDIT_STORE: file
      RELEASEPROOF_DATA_FILE: /app/data/releaseproof-store.json
      DEPLOYMENT_TARGET: alibaba-sas
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?DASHSCOPE_API_KEY must be set in the server-only env file}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3.7-plus}
      QWEN_FALLBACK_MODEL: ${QWEN_FALLBACK_MODEL:-qwen3.6-flash}
      QWEN_MAX_CONCURRENCY: ${QWEN_MAX_CONCURRENCY:-2}
      DEMO_STEP_DELAY_MS: ${DEMO_STEP_DELAY_MS:-120}
      CORS_ORIGINS: ""
      WORKFLOW_CREATE_LIMIT_PER_MINUTE: ${WORKFLOW_CREATE_LIMIT_PER_MINUTE:-1}
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - releaseproof-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 1536m
    cpus: 1.75
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8787/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    stop_grace_period: 20s

volumes:
  releaseproof-data:
