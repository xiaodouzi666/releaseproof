# Install as /etc/nginx/sites-available/grantguard, replace the server_name,
# enable it, and validate with `sudo nginx -t` before reload.

# This file is included from nginx's http context, where shared rate/connection
# zones are valid. The app also enforces a global workflow-creation budget.
limit_req_zone $binary_remote_addr zone=grantguard_requests:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=grantguard_connections:10m;

server {
    listen 80;
    listen [::]:80;
    server_name grantguard.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grantguard.example.com;

    # Replace after obtaining a certificate (for example with Certbot).
    ssl_certificate /etc/letsencrypt/live/grantguard.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grantguard.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:GrantGuardTLS:10m;
    ssl_session_tickets off;

    client_max_body_size 8m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        limit_req zone=grantguard_requests burst=60 nodelay;
        limit_req_status 429;
        limit_conn grantguard_connections 20;
        limit_conn_status 429;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
