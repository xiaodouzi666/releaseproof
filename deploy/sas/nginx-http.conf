# Temporary IP-address entry point for time-limited judging. Replace with the
# TLS configuration in deploy/ecs/nginx.conf when a domain is available.
limit_req_zone $binary_remote_addr zone=releaseproof_requests:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=releaseproof_connections:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 8m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        limit_req zone=releaseproof_requests burst=60 nodelay;
        limit_req_status 429;
        limit_conn releaseproof_connections 20;
        limit_conn_status 429;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # The app emits these headers for direct/local use. Hide the upstream
        # copies so the public proxy returns one canonical value for each.
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
